# Livekit
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      containers:
        - name: livekit
          image: ghcr.io/stoatchat/livekit-server:v1.9.6
          command: ["/livekit-server"]
          args: ["--config", "/etc/livekit.yml"]
          ports:
            - containerPort: 7880
          volumeMounts:
            - name: config
              mountPath: /etc/livekit.yml
              subPath: livekit.yml
      volumes:
        - name: config
          configMap:
            name: stoat-config
