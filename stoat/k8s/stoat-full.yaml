---
# Stoat Web
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/stoatchat/for-web:103d2bf
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: web-env
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: stoat
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: web
---
# Traefik Middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stoat-stripprefix
  namespace: stoat
spec:
  stripPrefix:
    prefixes:
      - /api
      - /ws
      - /autumn
      - /january
      - /gifbox
      - /livekit
      - /ingress
---
# Traefik IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stoat
  namespace: stoat
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api
          port: 14702
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/ws`)
      kind: Rule
      services:
        - name: events
          port: 14703
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/autumn`)
      kind: Rule
      services:
        - name: autumn
          port: 14704
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/january`)
      kind: Rule
      services:
        - name: january
          port: 14705
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/gifbox`)
      kind: Rule
      services:
        - name: gifbox
          port: 14706
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/livekit`)
      kind: Rule
      services:
        - name: livekit
          port: 7880
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/ingress`)
      kind: Rule
      services:
        - name: voice-ingress
          port: 8500
      middlewares:
        - name: stoat-stripprefix
    - match: Host(`stoat.sourcequench.org`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: web
          port: 5000
  tls: {}
