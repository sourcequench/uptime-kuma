apiVersion: v1
kind: Namespace
metadata:
  name: stoat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stoat-config
  namespace: stoat
data:
  Revolt.toml: |
    [hosts]
    app = "https://stoat.sourcequench.org"
    api = "https://stoat.sourcequench.org/api"
    events = "wss://stoat.sourcequench.org/ws"
    autumn = "https://stoat.sourcequench.org/autumn"
    january = "https://stoat.sourcequench.org/january"

    [hosts.livekit]
    worldwide = "wss://stoat.sourcequench.org/livekit"

    [pushd.vapid]
    private_key = ""
    public_key = "BKWw_moSPK7ArEEgvtYoitHKTUj4nKsIlEr_QbIeCnUzeBpSYg41fBLSrR5VZIfHXrcSrlL9dbeMQiAx2fL1558"

    [files]
    encryption_key = "wUqHLqZfJCL8jz/kXKw7zq9H+KTxNPUYFx6n7h4Yk3E="

    [api.livekit.nodes.worldwide]
    url = "http://livekit:7880"
    lat = 0.0
    lon = 0.0
    key = "04bc7aa434d9"
    secret = "9db5c5042c6e0d8a55c08625f40378fba3c74c43fda586a9"

    [features.limits.new_user]
    video_resolution = [1920, 1080]
    video_aspect_ratio = [0.3, 10]

    [features.limits.default]
    video_resolution = [1920, 1080]
    video_aspect_ratio = [0.3, 10]
  livekit.yml: |
    rtc:
      use_external_ip: true
      port_range_start: 50000
      port_range_end: 50100
      tcp_port: 7881

    redis:
      address: redis:6379

    turn:
      enabled: false

    keys:
      04bc7aa434d9: 9db5c5042c6e0d8a55c08625f40378fba3c74c43fda586a9

    webhook:
      api_key: 04bc7aa434d9
      urls:
      - "http://voice-ingress:8500/worldwide"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-env
  namespace: stoat
data:
  HOSTNAME: "https://stoat.sourcequench.org"
  REVOLT_PUBLIC_URL: "https://stoat.sourcequench.org/api"
  VITE_API_URL: "https://stoat.sourcequench.org/api"
  VITE_WS_URL: "wss://stoat.sourcequench.org/ws"
  VITE_MEDIA_URL: "https://stoat.sourcequench.org/autumn"
  VITE_PROXY_URL: "https://stoat.sourcequench.org/january"
  VITE_CFG_ENABLE_VIDEO: "true"
---
# MongoDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: docker.io/mongo
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
              subPath: mongodb
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stoat-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: stoat
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
---
# KeyDB (Redis)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keydb
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keydb
  template:
    metadata:
      labels:
        app: keydb
    spec:
      containers:
        - name: keydb
          image: docker.io/eqalpha/keydb
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: keydb
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stoat-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: stoat
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: keydb
---
# RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: docker.io/rabbitmq:4
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "rabbituser"
            - name: RABBITMQ_DEFAULT_PASS
              value: "rabbitpass"
          ports:
            - containerPort: 5672
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
              subPath: rabbitmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stoat-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rabbit
  namespace: stoat
spec:
  ports:
    - port: 5672
      targetPort: 5672
  selector:
    app: rabbitmq
---
# MinIO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: stoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: docker.io/minio/minio
          command: ["/bin/sh", "-c"]
          args: ["minio server /data"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioautumn"
            - name: MINIO_ROOT_PASSWORD
              value: "minioautumn"
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: minio
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stoat-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: stoat
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: minio
---
